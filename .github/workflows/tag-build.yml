name: Tag build and release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tag-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Test and build distributions
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      PYTHONUTF8: "1"
      QT_QPA_PLATFORM: offscreen
      QTWEBENGINE_DISABLE_SANDBOX: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = python -c "import tomllib; from pathlib import Path; print(tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])"
          $expectedTag = "v$version"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag '$env:GITHUB_REF_NAME' does not match package version '$version' (expected '$expectedTag')."
          }

      - name: Install project and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install . build pytest ruff twine

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest -q

      - name: Build wheel and source distribution
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: vacation-media-processor-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $files = Get-ChildItem dist -File | Select-Object -ExpandProperty FullName
          if (-not $files) {
            throw "No distributions found for release '$tag'."
          }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $files --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag $files `
              --verify-tag `
              --generate-notes `
              --title $tag `
              --repo $env:GITHUB_REPOSITORY
          }
          if ($LASTEXITCODE -ne 0) {
            throw "Publishing GitHub release '$tag' failed."
          }
